name: genui_shopping_assistant
description: A Flutter shopping assistant demo using Firebase AI Logic and GenUI.
publish_to: 'none'
version: 0.0.1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  firebase_ai: ^3.8.0
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  genui: ^0.7.0
  genui_firebase_ai: ^0.7.0
  json_schema_builder: ^0.1.3
  logging: ^1.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
